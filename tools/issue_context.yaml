name: issue_context
description: Convert GitHub issue text into likely affected repository areas and debugging steps.
input_schema:
  type: object
  properties:
    issue_title:
      type: string
    issue_body:
      type: string
    repository_scan:
      type: object
  required:
    - issue_title
    - repository_scan
implementation:
  service: backend.agents.issue_debugging.IssueDebuggingAgent.run
safety:
  executes_repository_code: false
