services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODESHERPA_MODEL: ${CODESHERPA_MODEL:-gpt-4.1-mini}
    ports:
      - "8000:8000"
    volumes:
      - codesherpa-memory:/app/backend/memory
      - codesherpa-repos:/app/backend/.codesherpa
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  codesherpa-memory:
  codesherpa-repos:
